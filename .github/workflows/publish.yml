name: Publish

on:
  push:
    tags:
      - 'v*' # Publish on any new tag matching v*, i.e. v1.0, v1.7.2
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix, e.g. 1.0.0)'
        required: true
        type: string

jobs:
  build:

    strategy:
      matrix:
        os: [ubuntu-latest]
        dotnet: ['9.0.x']
    runs-on: ${{ matrix.os }}

    steps:
    - name: Get version
      id: tag_name
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "current_version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "current_version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        fi
      shell: bash
    - uses: actions/checkout@v4
    - name: Setup dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet }}
        include-prerelease: true
    - name: Restore tools
      run: dotnet tool restore
    - name: Restore dependencies
      run: dotnet paket restore
    - name: Run Test
      run: dotnet build build.proj -c Release -t:Test
    - name: Run Pack
      run: dotnet build build.proj -c Release -t:Pack /p:Version=${{ steps.tag_name.outputs.current_version }}
    - name: Get Changelog Entry
      id: changelog_reader
      if: github.event_name == 'push'
      uses: mindsers/changelog-reader-action@v2
      with:
        version: ${{ steps.tag_name.outputs.current_version }}
        path: ./CHANGELOG.md
    - name: Create GitHub Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref }}
        name: ${{ github.ref_name }}
        body: ${{ steps.changelog_reader.outputs.log_entry }}
        draft: false
        prerelease: false
        files: bin/nupkg/*.nupkg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Push to NuGet
      run: dotnet nuget push bin/nupkg/*.nupkg --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
